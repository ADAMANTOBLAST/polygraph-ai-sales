# Деплой на VPS при каждом push в main (в т.ч. после merge из dev).
#
# Secrets в репозитории GitHub → Settings → Secrets and variables → Actions:
#   DEPLOY_HOST   — IP или hostname сервера (например 203.0.113.10)
#   DEPLOY_USER   — пользователь SSH (часто root)
#   DEPLOY_SSH_KEY — приватный ключ (содержимое id_ed25519), пара с ключом в authorized_keys на сервере
# Опционально:
#   DEPLOY_PORT   — порт SSH, если не 22
#
name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — git pull и перезапуск
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /root/Projects/PolygraphAiSales
            bash deploy.sh
