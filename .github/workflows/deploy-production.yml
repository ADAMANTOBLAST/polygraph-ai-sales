# Деплой на VPS при каждом push в main (в т.ч. после merge из dev).
#
# Secrets (Actions или Environment «production»):
#   DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY — SSH на VPS
#   comet_api_key — ключ Comet API (в .env на сервере пишется как COMET_API_KEY)
#
name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH — COMET_API_KEY в .env, git pull, деплой
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /root/Projects/PolygraphAiSales
            COMET_VAL='${{ secrets.comet_api_key }}'
            if [ -n "$COMET_VAL" ]; then
              touch .env
              grep -vE '^(COMET_API_KEY|COMETAPI_KEY)=' .env > .env.tmp 2>/dev/null || true
              echo "COMET_API_KEY=$COMET_VAL" >> .env.tmp
              mv .env.tmp .env
              chmod 600 .env
            fi
            bash deploy.sh
