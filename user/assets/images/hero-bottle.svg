<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="hb-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(196,181,253,0.35)"/>
      <stop offset="45%" stop-color="rgba(124,58,237,0.12)"/>
      <stop offset="100%" stop-color="rgba(91,33,182,0.25)"/>
    </linearGradient>
    <linearGradient id="hb-label" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <filter id="hb-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- shadow -->
  <ellipse cx="160" cy="448" rx="72" ry="14" fill="rgba(0,0,0,0.35)" filter="url(#hb-soft)"/>
  <!-- bottle body -->
  <path d="M118 72c0-28 22-50 50-50s50 22 50 50v28c0 14-8 26-20 32l-8 4c-10 5-16 16-16 28v296c0 18-14 32-32 32h-4c-18 0-32-14-32-32V164c0-12-6-23-16-28l-8-4c-12-6-20-18-20-32V72z" fill="url(#hb-glass)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <!-- neck highlight -->
  <path d="M148 40h24a4 4 0 014 4v28a4 4 0 01-4 4h-24a4 4 0 01-4-4V44a4 4 0 014-4z" fill="rgba(255,255,255,0.08)"/>
  <!-- cap -->
  <rect x="136" y="12" width="48" height="36" rx="8" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <!-- label -->
  <rect x="112" y="200" width="96" height="120" rx="10" fill="url(#hb-label)" opacity="0.92"/>
  <rect x="124" y="216" width="72" height="8" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="124" y="232" width="56" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <text x="160" y="288" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em">ВАШ БРЕНД</text>
  <!-- shine -->
  <path d="M132 120c24-8 48-8 72 0" stroke="rgba(255,255,255,0.25)" stroke-width="6" stroke-linecap="round"/>
</svg>
