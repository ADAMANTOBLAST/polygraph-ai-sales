<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | Админ-панель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  <div class="login-page">
    <div class="login-card">
      <div class="login-card__hero" aria-hidden="true"></div>
      <div class="login-card__body">
        <h1>Админ-панель</h1>
        <p class="hint">Вход только для сотрудников. Дальше сюда подключим авторизацию через Bitrix или ваш API.</p>
        <form id="loginForm" novalidate>
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" autocomplete="username" placeholder="admin@company.com" required>

          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>

          <button type="submit" class="btn btn-primary" id="loginSubmitBtn">Войти</button>
          <p id="loginError" class="login-error" aria-live="polite"></p>
        </form>
      </div>
      <div class="login-card__footer">
        <p class="hint">
          <a href="../flexn.html">← На главную</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../assets/js/auth-session.js"></script>
  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('loginSubmitBtn');
      const err = document.getElementById('loginError');
      const submitBtnDefaultText = submitBtn.textContent;

      function setError(message) {
        err.textContent = message || '';
      }

      function setSubmitting(isSubmitting) {
        emailInput.disabled = isSubmitting;
        passwordInput.disabled = isSubmitting;
        submitBtn.disabled = isSubmitting;
        submitBtn.textContent = isSubmitting ? 'Входим...' : submitBtnDefaultText;
        submitBtn.setAttribute('aria-busy', isSubmitting ? 'true' : 'false');
      }

      // Если уже вошли — сразу в кабинет.
      if (window.FnrAuth && typeof FnrAuth.isLoggedIn === 'function' && FnrAuth.isLoggedIn()) {
        window.location.replace('index.html');
        return;
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        setError('');
        setSubmitting(true);

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
          setError('Заполните e-mail и пароль.');
          setSubmitting(false);
          return;
        }

        if (!window.FnrAuth || typeof FnrAuth.setSessionStub !== 'function') {
          setError('Не удалось инициализировать авторизацию. Обновите страницу.');
          setSubmitting(false);
          return;
        }

        try {
          // Заглушка входа: любой непустой email + пароль создаёт сессию.
          // Позже заменить на реальный запрос к вашему API/Bitrix.
          FnrAuth.setSessionStub({ user: email });
          window.location.href = 'index.html';
        } catch (error) {
          setError('Ошибка входа. Попробуйте снова.');
          setSubmitting(false);
        }
      });
    })();
  </script>
</body>
</html>
